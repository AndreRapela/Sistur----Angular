<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SisTur</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0077B6">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
  <style>
    .marker-pin {
      width: 40px; height: 40px; border-radius: 50% 50% 50% 0;
      background: #0077B6; position: absolute; transform: rotate(-45deg);
      left: 50%; top: 50%; margin: -20px 0 0 -20px;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .marker-pin i { transform: rotate(45deg); color: white; font-size: 18px; }
    .pin-restaurant { background: #ef4444; }
    .pin-hotel { background: #3b82f6; }
    .pin-event { background: #f59e0b; }
    .pin-tour { background: #10b981; }
    
    /* Routing instructions panel override - hiding it */
    .leaflet-routing-container { display: none !important; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
